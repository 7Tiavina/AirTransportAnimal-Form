                <label for="first-name" data-key="first_name_label">Prénom:</label>

                <input type="text" id="last-name" name="last-name" required>

                <label for="email" data-key="email_label">Adresse Email:</label>

                <div class="checkbox-group">

                    <label for="consent" data-key="consent_label">J'ai lu et j'accepte les Conditions Générales et les Politiques de Confidentialité.</label>
                </div>

                <button type="button" id="prev-page-4-btn" data-key="prev_btn">Précédent</button>
                <button type="submit" data-key="submit_btn">Soumettre</button>
